<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pigeon Email Editor — Playground</title>
  <link rel="icon" type="image/png" href="../lit-pigeon.png" />
  <style>
    /*
     * Playground token system. Two themes (light + dark) authored as CSS
     * variables on `body` so toggling `data-theme` re-skins the whole shell
     * in sync with the editor's own theme. `prefers-color-scheme` picks the
     * default when no explicit theme is set.
     */
    :root {
      /* light defaults */
      --pg-bg: #ffffff;
      --pg-surface: #f8fafc;       /* slate-50 — header */
      --pg-surface-2: #ffffff;     /* button face on header */
      --pg-surface-hover: #f1f5f9; /* slate-100 */
      --pg-border: #e2e8f0;        /* slate-200 */
      --pg-border-strong: #cbd5e1; /* slate-300 */
      --pg-text: #0f172a;          /* slate-900 */
      --pg-text-secondary: #64748b;/* slate-500 */
      --pg-text-muted: #94a3b8;    /* slate-400 */
      --pg-primary-bg: #4f46e5;    /* indigo-600 */
      --pg-primary-fg: #ffffff;
      --pg-primary-hover: #4338ca; /* indigo-700 */
      --pg-success: #16a34a;
      --pg-warning: #ca8a04;
      --pg-overlay: rgba(15, 23, 42, 0.45);
    }

    body[data-theme='dark'] {
      --pg-bg: #09090b;
      --pg-surface: #18181b;
      --pg-surface-2: #27272a;
      --pg-surface-hover: #3f3f46;
      --pg-border: #27272a;
      --pg-border-strong: #3f3f46;
      --pg-text: #fafafa;
      --pg-text-secondary: #a1a1aa; /* zinc-400 */
      --pg-text-muted: #71717a;
      --pg-primary-bg: #fafafa;
      --pg-primary-fg: #18181b;
      --pg-primary-hover: #e4e4e7;
      --pg-success: #22c55e;
      --pg-warning: #eab308;
      --pg-overlay: rgba(0, 0, 0, 0.65);
    }

    @media (prefers-color-scheme: dark) {
      body[data-theme='auto'] {
        --pg-bg: #09090b;
        --pg-surface: #18181b;
        --pg-surface-2: #27272a;
        --pg-surface-hover: #3f3f46;
        --pg-border: #27272a;
        --pg-border-strong: #3f3f46;
        --pg-text: #fafafa;
        --pg-text-secondary: #a1a1aa;
        --pg-text-muted: #71717a;
        --pg-primary-bg: #fafafa;
        --pg-primary-fg: #18181b;
        --pg-primary-hover: #e4e4e7;
        --pg-success: #22c55e;
        --pg-warning: #eab308;
        --pg-overlay: rgba(0, 0, 0, 0.65);
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--pg-bg);
      color: var(--pg-text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background-color 0.15s ease, color 0.15s ease;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: var(--pg-surface);
      border-bottom: 1px solid var(--pg-border);
      height: 48px;
      flex-shrink: 0;
    }

    .app-header h1 {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .app-header h1 a {
      color: inherit;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .app-header h1 a:hover {
      opacity: 0.85;
    }

    .app-header h1 img {
      border-radius: 4px;
    }

    .hamburger-btn {
      display: none;
      padding: 6px;
      border-radius: 6px;
      border: 1px solid var(--pg-border);
      background: var(--pg-surface-2);
      color: var(--pg-text);
      cursor: pointer;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .header-actions button {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--pg-border-strong);
      background: var(--pg-surface-2);
      color: var(--pg-text);
      font-size: 13px;
      cursor: pointer;
      transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .header-actions button:hover {
      background: var(--pg-surface-hover);
    }

    .header-actions button.primary {
      background: var(--pg-primary-bg);
      border-color: var(--pg-primary-bg);
      color: var(--pg-primary-fg);
      font-weight: 500;
    }

    .header-actions button.primary:hover {
      background: var(--pg-primary-hover);
      border-color: var(--pg-primary-hover);
    }

    .header-actions button.save-feedback {
      color: var(--pg-success);
      border-color: var(--pg-success);
    }

    /* Theme select inherits the header-button look so the chrome stays consistent across themes. */
    .header-actions label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--pg-text-secondary);
    }

    .header-actions select {
      height: 32px;
      border-radius: 6px;
      border: 1px solid var(--pg-border-strong);
      background: var(--pg-surface-2);
      color: var(--pg-text);
      padding: 0 8px;
      font-size: 13px;
      cursor: pointer;
    }

    .editor-container {
      flex: 1;
      overflow: hidden;
    }

    pigeon-editor {
      width: 100%;
      height: 100%;
    }

    /* Modal overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--pg-overlay);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--pg-surface);
      border: 1px solid var(--pg-border);
      border-radius: 12px;
      width: 80vw;
      max-width: 900px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      color: var(--pg-text);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--pg-border);
    }

    .modal-header h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .modal-header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-header-actions button {
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--pg-border-strong);
      background: var(--pg-surface-2);
      color: var(--pg-text);
      font-size: 12px;
      cursor: pointer;
      transition: background-color 0.15s ease, border-color 0.15s ease;
    }

    .modal-header-actions button:hover {
      background: var(--pg-surface-hover);
    }

    .modal-close-btn {
      background: none;
      border: none;
      color: var(--pg-text-muted);
      font-size: 20px;
      cursor: pointer;
      padding: 0 0 0 8px;
    }

    .modal-close-btn:hover {
      color: var(--pg-text);
    }

    .modal-tabs {
      display: flex;
      border-bottom: 1px solid var(--pg-border);
    }

    .modal-tabs button {
      padding: 10px 20px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--pg-text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: color 0.15s ease, border-color 0.15s ease;
    }

    .modal-tabs button.active {
      color: var(--pg-text);
      border-bottom-color: var(--pg-text);
    }

    .modal-body {
      flex: 1;
      overflow: auto;
      padding: 16px 20px;
    }

    .modal-body pre {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12px;
      line-height: 1.6;
      color: var(--pg-text);
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* Import MJML Modal */
    .import-textarea {
      width: 100%;
      min-height: 260px;
      background: var(--pg-bg);
      border: 1px solid var(--pg-border);
      border-radius: 8px;
      color: var(--pg-text);
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12px;
      line-height: 1.6;
      padding: 16px;
      resize: vertical;
    }

    .import-textarea:focus {
      outline: none;
      border-color: var(--pg-border-strong);
    }

    .import-textarea::placeholder {
      color: var(--pg-text-muted);
    }

    .import-warnings {
      margin-top: 12px;
      padding: 12px;
      background: color-mix(in srgb, var(--pg-warning) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--pg-warning) 35%, transparent);
      border-radius: 8px;
      font-size: 12px;
      color: var(--pg-warning);
      display: none;
    }

    .import-warnings.visible {
      display: block;
    }

    .import-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }

    .import-actions button {
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background-color 0.15s ease, border-color 0.15s ease;
    }

    .import-btn-cancel {
      border: 1px solid var(--pg-border-strong);
      background: var(--pg-surface-2);
      color: var(--pg-text);
    }

    .import-btn-cancel:hover {
      background: var(--pg-surface-hover);
    }

    .import-btn-import {
      border: 1px solid var(--pg-primary-bg);
      background: var(--pg-primary-bg);
      color: var(--pg-primary-fg);
      font-weight: 500;
    }

    .import-btn-import:hover {
      background: var(--pg-primary-hover);
      border-color: var(--pg-primary-hover);
    }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 8px 0;
    }

    .template-card {
      padding: 16px;
      border: 1px solid var(--pg-border);
      border-radius: 8px;
      background: var(--pg-bg);
      cursor: pointer;
      transition: background-color 0.15s ease, border-color 0.15s ease;
    }

    .template-card:hover {
      border-color: var(--pg-primary-bg);
      background: var(--pg-surface-hover);
    }

    .template-card h3 {
      font-size: 14px;
      margin-bottom: 4px;
    }

    .template-card p {
      font-size: 12px;
      color: var(--pg-text-secondary);
    }

    /* Mobile responsive header */
    @media (max-width: 640px) {
      .hamburger-btn {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .header-actions {
        display: none;
        position: absolute;
        top: 48px;
        right: 0;
        left: 0;
        flex-direction: column;
        background: var(--pg-surface);
        border-bottom: 1px solid var(--pg-border);
        padding: 8px 16px;
        z-index: 50;
      }

      .header-actions.open {
        display: flex;
      }

      .header-actions button {
        width: 100%;
        text-align: center;
      }

      .template-grid {
        grid-template-columns: 1fr;
      }

      .modal {
        width: 95vw;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <h1>
      <a href="../">
        <img src="../lit-pigeon.png" alt="" width="24" height="24">
        Lit Pigeon Playground
      </a>
    </h1>
    <button class="hamburger-btn" id="hamburger-btn" aria-label="Toggle menu">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 4h12M2 8h12M2 12h12"/></svg>
    </button>
    <div class="header-actions" id="header-actions">
      <label for="theme-select">
        Theme
        <select id="theme-select">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
          <option value="auto">Auto</option>
        </select>
      </label>
      <button id="btn-import-mjml">Import MJML</button>
      <button id="btn-save">Save</button>
      <button id="btn-templates">Templates</button>
      <button id="btn-json">View JSON</button>
      <button id="btn-export" class="primary">Export</button>
    </div>
  </header>

  <div class="editor-container">
    <pigeon-editor id="editor"></pigeon-editor>
  </div>

  <!-- Export/JSON Modal -->
  <div class="modal-overlay" id="modal-export">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Export</h2>
        <div class="modal-header-actions">
          <button id="btn-copy-export">Copy</button>
          <button id="btn-download-export">Download</button>
          <span class="modal-close-btn" id="modal-close">&times;</span>
        </div>
      </div>
      <div class="modal-tabs" id="modal-tabs">
        <button class="active" data-tab="html">HTML</button>
        <button data-tab="mjml">MJML</button>
        <button data-tab="json">JSON</button>
      </div>
      <div class="modal-body">
        <pre id="modal-content"></pre>
      </div>
    </div>
  </div>

  <!-- Import MJML Modal -->
  <div class="modal-overlay" id="modal-import-mjml">
    <div class="modal" style="max-width: 700px;">
      <div class="modal-header">
        <h2>Import MJML</h2>
        <span class="modal-close-btn" id="import-mjml-close">&times;</span>
      </div>
      <div class="modal-body">
        <textarea class="import-textarea" id="import-mjml-textarea" placeholder="Paste your MJML markup here...&#10;&#10;<mjml>&#10;  <mj-body>&#10;    <mj-section>&#10;      <mj-column>&#10;        <mj-text>Hello World</mj-text>&#10;      </mj-column>&#10;    </mj-section>&#10;  </mj-body>&#10;</mjml>"></textarea>
        <div class="import-warnings" id="import-warnings"></div>
        <div class="import-actions">
          <button class="import-btn-cancel" id="import-mjml-cancel">Cancel</button>
          <button class="import-btn-import" id="import-mjml-confirm">Import</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Templates Modal -->
  <div class="modal-overlay" id="modal-templates">
    <div class="modal">
      <div class="modal-header">
        <h2>Choose a Template</h2>
        <span class="modal-close-btn" id="templates-close">&times;</span>
      </div>
      <div class="modal-body">
        <div class="template-grid" id="template-grid"></div>
      </div>
    </div>
  </div>

  <script type="module" src="../src/playground.ts"></script>
</body>
</html>
